name: shelf_app
description: "AppConfigShelf - backup and restore application configurations before reinstalling Windows."
publish_to: 'none'
version: 0.1.0+1
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  file_selector: ^1.0.0
  fluent_ui: ^4.9.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  shelf_backup: ^0.1.0
  shelf_core: ^0.1.0
  shelf_db: ^0.1.0
  shelf_detect: ^0.1.0
  shelf_rules: ^0.1.0
  shelf_win32: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/db.json
