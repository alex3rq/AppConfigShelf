name: shelf_app
description: "AppConfigShelf - backup and restore application configurations before reinstalling Windows."
publish_to: 'none'
version: 0.2.0+2
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  file_selector: ^1.0.0
  fluent_ui: ^4.9.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  intl: ^0.20.0
  logging: ^1.2.0
  shelf_backup: ^0.1.0
  shelf_core: ^0.1.0
  shelf_db: ^0.1.0
  shelf_detect: ^0.1.0
  shelf_rules: ^0.1.0
  shelf_win32: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.0

msix_config:
  display_name: AppConfigShelf
  publisher_display_name: AppConfigShelf Project
  identity_name: dev.appconfigshelf.shelf
  msix_version: 0.2.0.0
  logo_path: windows/runner/resources/app_icon.ico
  capabilities: ""
  store: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/db.json
