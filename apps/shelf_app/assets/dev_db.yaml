# Development seed database — a handful of entries for exercising detection
# during M1–M3. Replaced by the real signed db bundle in M4.
# Format: list of db schema v1 entries (docs/adr/ADR-001-db-schema.md).
- id: vscode
  name: Visual Studio Code
  publisher: Microsoft
  aliases: [code, vs-code, microsoft visual studio code]
  detect:
    - path: "%LOCALAPPDATA%\\Programs\\Microsoft VS Code\\Code.exe"
  backup:
    - path: "%APPDATA%\\Code\\User"
      include: ["settings.json", "keybindings.json", "snippets/**"]
      exclude: ["workspaceStorage/**", "**/Cache*/**"]
  winget: Microsoft.VisualStudioCode
  risk: safe

- id: sharex
  name: ShareX
  publisher: ShareX Team
  detect:
    - path: "%DOCUMENTS%\\ShareX\\ApplicationConfig.json"
    - path: "%USERPROFILE%\\Documents\\ShareX"
  backup:
    - path: "%DOCUMENTS%\\ShareX"
      exclude: ["Screenshots/**", "Logs/**", "Backup/**"]
  winget: ShareX.ShareX
  risk: safe

- id: audacity
  name: Audacity
  publisher: Audacity Team
  detect:
    - path: "%APPDATA%\\audacity\\audacity.cfg"
  backup:
    - path: "%APPDATA%\\audacity"
      exclude: ["SessionData/**", "AutoSave/**"]
  winget: Audacity.Audacity
  risk: safe

- id: aimp
  name: AIMP
  publisher: Artem Izmaylov
  detect:
    - path: "%APPDATA%\\AIMP"
  backup:
    - path: "%APPDATA%\\AIMP"
  winget: AIMP.AIMP
  risk: safe
